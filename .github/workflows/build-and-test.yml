name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Set up .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore ./src/dotnetANPR.slnx

    - name: Build
      run: dotnet build ./src/dotnetANPR.slnx --configuration Release --no-restore

    - name: Test with coverage
      run: dotnet test ./src/dotnetANPR.slnx --configuration Release --no-build -- --coverage --coverage-output-format cobertura

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: src/**/TestResults/**/*.cobertura.xml
        disable_search: true
        flags: unittests
        name: codecov-dotnetANPR

    - name: Pack
      run: dotnet pack ./src/dotnetANPR/dotnetANPR.csproj --configuration Release --no-build --output ./artifacts
