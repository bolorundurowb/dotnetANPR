name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore ./src/dotnetANPR.slnx

    - name: Build
      run: dotnet build ./src/dotnetANPR.slnx --configuration Release --no-restore

    - name: Test
      run: dotnet test ./src/dotnetANPR.slnx --configuration Release --no-build
